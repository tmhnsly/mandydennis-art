backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: "" # Tom: fill in after creating Cloudinary account
    api_key: ""    # Tom: fill in after creating Cloudinary account

collections:
  - name: artwork
    label: Artwork
    folder: content/artwork
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Description, name: description, widget: text, required: false }
      - label: Medium
        name: medium
        widget: select
        multiple: true
        options:
          - pastel
          - watercolour
          - pencil
          - oil
          - charcoal
          - mixed media
          - acrylic
          - ink
      - label: Subject
        name: subject
        widget: select
        multiple: true
        options:
          - pets
          - dogs
          - cats
          - horses
          - people
          - landscape
          - still life
          - wildlife
          - flowers
          - buildings
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }

  - name: events
    label: Events
    folder: content/events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: Location, name: location, widget: string }
      - { label: Description, name: body, widget: markdown }
      - { label: Link, name: link, widget: string, required: false }

  - name: commissions
    label: Commission Pricing
    folder: content/commissions
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Price Options
        name: options
        widget: list
        fields:
          - { label: Size, name: size, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: Price, name: price, widget: number, value_type: int }
      - label: Add-ons
        name: addons
        widget: list
        required: false
        fields:
          - { label: Description, name: description, widget: string }
          - { label: Price, name: price, widget: number, value_type: int }
      - { label: "What's Included", name: included, widget: text, required: false }
      - { label: Notes, name: notes, widget: text, required: false }

  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: content/pages/about.md
        fields:
          - { label: Bio, name: bio, widget: markdown }
          - { label: Photo, name: photo, widget: image, required: false }

  - name: settings
    label: Site Settings
    files:
      - name: settings
        label: Settings
        file: content/settings.json
        fields:
          - { label: Tagline, name: tagline, widget: string }
          - { label: Contact Email, name: contact_email, widget: string }
          - { label: Facebook URL, name: facebook_url, widget: string, required: false }
          - { label: Currency Symbol, name: currency_symbol, widget: string, default: "£" }
