<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Mandy Dennis Art</title>
    <meta name="description" content="Self-taught artist specialising in pastel pet portraits, wildlife, seascapes and watercolour landscapes. Open for commissions." />
    <meta property="og:title" content="Mandy Dennis Art" />
    <meta property="og:description" content="Self-taught artist specialising in pastel pet portraits, wildlife, seascapes and watercolour landscapes. Open for commissions." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f4;
        transition: opacity 0.3s ease;
      }
      #loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loader span {
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #b0a096;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @media (prefers-color-scheme: dark) {
        #loader { background: #1c1513; }
        #loader span { color: #6e5e55; }
      }
    </style>
  </head>
  <body>
    <div id="loader"><span>M</span></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var loader = document.getElementById('loader');
        if (!loader) return;

        function hideLoader() {
          loader.classList.add('fade-out');
          loader.addEventListener('transitionend', function() {
            loader.remove();
          }, { once: true });
        }

        // document.fonts.ready is supported in all modern browsers
        // and resolves when all render-blocking fonts have loaded
        document.fonts.ready.then(hideLoader);
      })();
    </script>
  </body>
</html>
