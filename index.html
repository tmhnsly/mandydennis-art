<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Mandy Dennis Art</title>
    <meta name="description" content="Self-taught artist specialising in pastel pet portraits, wildlife, seascapes and watercolour landscapes. Open for commissions." />
    <meta property="og:title" content="Mandy Dennis Art" />
    <meta property="og:description" content="Self-taught artist specialising in pastel pet portraits, wildlife, seascapes and watercolour landscapes. Open for commissions." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f4;
        transition: opacity 0.3s ease;
      }
      #loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loader .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #e0cec7;
        border-top-color: #a0705a;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-color-scheme: dark) {
        #loader { background: #1c1513; }
        #loader .spinner { border-color: #3d302a; border-top-color: #c48a6e; }
      }
    </style>
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
